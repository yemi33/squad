name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Bump version, update changelog, and publish
        run: |
          # Get the latest published version from npm (or default to 0.1.0)
          CURRENT=$(npm view @yemi33/squad version 2>/dev/null || echo "0.1.0")
          echo "Current npm version: $CURRENT"

          # Bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          TODAY=$(date +%Y-%m-%d)
          echo "Publishing version: $NEXT"

          # Update package.json
          node -e "const p=require('./package.json'); p.version='$NEXT'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

          # Find changed files since last publish
          LAST_PUBLISH=$(git log --oneline --grep='\[skip ci\]' -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$LAST_PUBLISH" ]; then
            git diff --name-only "$LAST_PUBLISH" HEAD -- . ':!package.json' > /tmp/changed_files.txt 2>/dev/null || true
          else
            git diff --name-only HEAD~1 HEAD -- . ':!package.json' > /tmp/changed_files.txt 2>/dev/null || true
          fi

          # Write changelog update script to a temp file (avoids shell escaping)
          cat > /tmp/update-changelog.js << 'SCRIPT'
          const fs = require('fs');
          const version = process.argv[2];
          const date = process.argv[3];
          const changed = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim().split('\n').filter(Boolean);
          if (changed.length === 0) process.exit(0);

          const cats = { Engine: [], Dashboard: [], Playbooks: [], Agents: [], Documentation: [], Other: [] };
          for (const f of changed) {
            const name = f.split('/').pop();
            if (f.startsWith('engine') || f === 'engine.js') cats.Engine.push(f);
            else if (f.startsWith('dashboard')) cats.Dashboard.push(f);
            else if (f.startsWith('playbooks/')) cats.Playbooks.push(name);
            else if (/^agents\/.*\/charter\.md$/.test(f)) cats.Agents.push(f);
            else if (f.startsWith('docs/') || f === 'README.md' || f === 'CHANGELOG.md') cats.Documentation.push(name);
            else if (f !== '.gitignore' && f !== '.npmignore') cats.Other.push(f);
          }

          let entry = `## ${version} (${date})\n\n`;
          for (const [cat, files] of Object.entries(cats)) {
            if (files.length > 0) {
              entry += `### ${cat}\n`;
              for (const f of files) entry += `- ${f}\n`;
              entry += '\n';
            }
          }

          const cl = fs.readFileSync('CHANGELOG.md', 'utf8');
          const idx = cl.indexOf('\n\n');
          if (idx !== -1) {
            fs.writeFileSync('CHANGELOG.md', cl.slice(0, idx + 2) + entry + cl.slice(idx + 2));
            console.log('Changelog updated with ' + changed.length + ' changed files');
          }
          SCRIPT

          node /tmp/update-changelog.js "$NEXT" "$TODAY"

          # Publish
          npm publish --access public

          # Commit version bump + changelog back to repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore: publish $NEXT — changelog updated [skip ci]"
            git push
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
